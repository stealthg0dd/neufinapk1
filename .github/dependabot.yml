version: 2
updates:
  # ── Python (neufin-backend) ───────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /neufin-backend
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - backend
    groups:
      fastapi-group:
        patterns: ["fastapi", "uvicorn", "starlette"]
      ai-providers:
        patterns: ["anthropic", "openai", "groq", "google-genai"]
      observability:
        patterns: ["sentry-sdk", "structlog", "prometheus-*"]

  # ── Node.js (neufin-web) ──────────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /neufin-web
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - web
    groups:
      next-group:
        patterns: ["next", "@next/*"]
      sentry-group:
        patterns: ["@sentry/*"]
      react-group:
        patterns: ["react", "react-dom", "@types/react*"]

  # ── Node.js (neufin-mobile) ───────────────────────────────────────────────────
  - package-ecosystem: npm
    directory: /neufin-mobile
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - mobile
    groups:
      expo-group:
        patterns: ["expo", "expo-*"]
      react-native-group:
        patterns: ["react-native", "react-native-*", "@react-native*", "@react-navigation*"]
      sentry-group:
        patterns: ["@sentry/*"]

  # ── GitHub Actions ─────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
