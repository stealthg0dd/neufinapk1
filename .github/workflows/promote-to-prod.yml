name: Promote to Production

# ── Trigger ───────────────────────────────────────────────────────────────────
# Manual-only: the founder (or any authorized team member) goes to
# Actions → "Promote to Production" → Run workflow.
# The job is gated by the "production" GitHub Environment, which should be
# configured to require approval from stealthg0dd before the deploy runs.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "promote" to confirm production deployment'
        required: true
        default: ''

# Require contents: write so the workflow can push the merge commit to main.
permissions:
  contents: write

jobs:
  # ── Guard: validate manual confirmation ───────────────────────────────────
  validate:
    name: Validate Confirmation
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "promote" ]; then
            echo "❌ Confirmation failed. Type exactly 'promote' in the input field."
            exit 1
          fi
          echo "✅ Confirmation accepted."

  # ── Merge develop → main & Deploy ─────────────────────────────────────────
  deploy-production:
    name: Merge & Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    # ── GitHub Environment gate ───────────────────────────────────────────
    # Configure the "production" environment at:
    #   Settings → Environments → production → Required reviewers → stealthg0dd
    # The job will pause here and wait for one-click approval in the Actions UI.
    environment: production

    steps:
      - name: Checkout (full history for merge)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # GH_PAT must be a Personal Access Token (classic) with repo scope
          # stored as a repository secret. GITHUB_TOKEN cannot push to
          # branch-protected refs, but a PAT from an account on the bypass list can.
          token: ${{ secrets.GH_PAT }}

      # ── Merge develop → main ──────────────────────────────────────────────
      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch latest develop and main
        run: |
          git fetch origin develop main
          git checkout main
          git pull origin main

      - name: Merge develop into main
        run: |
          git merge --no-ff origin/develop \
            -m "chore: promote develop → main [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"

      - name: Push main
        run: git push origin main

      # ── Deploy backend to Railway (production) ────────────────────────────
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy neufin-backend to Railway (production)
        working-directory: neufin-backend
        run: railway up --service Neufin101 --environment production --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for Railway deployment to propagate
        run: sleep 45

      - name: Health check /health (production)
        run: |
          HEALTH_URL="${{ secrets.RAILWAY_BACKEND_URL }}/health"
          echo "Checking $HEALTH_URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "$HEALTH_URL" \
              -H "Accept: application/json" \
              --max-time 15 \
              -o /tmp/health.json -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              BODY_STATUS=$(python3 -c "import json; d=json.load(open('/tmp/health.json')); print(d.get('status',''))" 2>/dev/null || echo "")
              if [ "$BODY_STATUS" = "ok" ]; then
                echo "✅ Backend health check passed"
                break
              fi
            fi
            echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            sleep 15
          done

      # ── Deploy web to Vercel (production) ─────────────────────────────────
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy neufin-web to Vercel (production)
        id: vercel-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_NEUFIN_WEB }}
        run: |
          RAW=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel-output.txt)
          DEPLOYMENT_URL=$(echo "$RAW" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Could not extract deployment URL:"
            cat /tmp/vercel-output.txt
            exit 1
          fi
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "✅ Web deployed to: $DEPLOYMENT_URL"

      # ── Sentry releases ───────────────────────────────────────────────────
      - name: Create Sentry release (backend)
        uses: getsentry/action-release@v1
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_NEUFIN_BACKEND }}
        with:
          environment: production
          version: ${{ github.sha }}

      - name: Create Sentry release (web)
        uses: getsentry/action-release@v1
        continue-on-error: true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_NEUFIN_WEB }}
        with:
          environment: production
          version: ${{ github.sha }}

      # ── Heartbeat ─────────────────────────────────────────────────────────
      - name: POST heartbeat to router-system
        run: |
          for SVC in neufin-backend neufin-web; do
            curl -s -X POST "${{ secrets.AGENT_OS_URL }}/api/heartbeat/$SVC" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.AGENT_OS_API_KEY }}" \
              -d "{
                \"service\": \"$SVC\",
                \"status\": \"deployed\",
                \"sha\": \"${{ github.sha }}\",
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }" || echo "Heartbeat unavailable for $SVC — continuing"
          done

      # ── Slack Success ─────────────────────────────────────────────────────
      - name: Notify Slack — production deploy success
        if: success()
        run: |
          W1="${{ secrets.SLACK_WEBHOOK_NEUFIN_ALERTS }}"
          W2="${{ secrets.SLACK_WEBHOOK_CTECH_COMMAND }}"
          SHA="${{ github.sha }}"
          URL="${{ steps.vercel-deploy.outputs.deployment_url }}"
          [ -n "$W1" ] && curl -s -X POST "$W1" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🎉 *NeuFin promoted to PRODUCTION*\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"Web URL\", \"value\": \"$URL\", \"short\": false},
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/$SHA|$SHA>\", \"short\": true},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true}
                ]
              }]
            }" || true
          [ -n "$W2" ] && curl -s -X POST "$W2" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🎉 NeuFin → PRODUCTION | sha: $SHA | web: $URL\"}" || true

      # ── Slack Failure ─────────────────────────────────────────────────────
      - name: Notify Slack — production deploy failure
        if: failure()
        run: |
          W1="${{ secrets.SLACK_WEBHOOK_NEUFIN_ALERTS }}"
          W2="${{ secrets.SLACK_WEBHOOK_CTECH_COMMAND }}"
          [ -n "$W1" ] && curl -s -X POST "$W1" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🚨 *NeuFin PRODUCTION deploy FAILED*\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\", \"short\": false},
                  {\"title\": \"Triggered by\", \"value\": \"${{ github.actor }}\", \"short\": true}
                ]
              }]
            }" || true
          [ -n "$W2" ] && curl -s -X POST "$W2" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"🚨 NeuFin PRODUCTION deploy FAILED | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\"}" || true
