name: CI Backend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'neufin-backend/**'
      - '.github/workflows/ci-backend.yml'
  push:
    branches: [develop, main]
    paths:
      - 'neufin-backend/**'
      - '.github/workflows/ci-backend.yml'

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-checks:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neufin-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('neufin-backend/requirements*.txt') }}

      - name: Install
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pytest
        env:
          ENVIRONMENT: test
          BYPASS_AUTH_IN_DEV: "false"
          SUPABASE_URL: "https://test.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "test-key"
          FERNET_MASTER_KEY: "test-fernet-key-32bytes-padded00"
        run: |
          pytest tests/ \
            --maxfail=3 \
            --disable-warnings \
            --timeout=60 \
            -q
