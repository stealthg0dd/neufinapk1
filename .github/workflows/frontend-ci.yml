name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'neufin-web/**'
      - '.github/workflows/frontend-ci.yml'
      - 'neufin-web/package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'neufin-web/**'
      - '.github/workflows/frontend-ci.yml'
      - 'neufin-web/package-lock.json'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Lint & Type Check ──────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: neufin-web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix neufin-web

      - name: ESLint
        run: npm run lint --prefix neufin-web

      - name: TypeScript type check
        working-directory: neufin-web
        run: npx tsc --noEmit

  # ── Unit Tests ────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: neufin-web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix neufin-web

      - name: Run Jest tests
        working-directory: neufin-web
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts?.test ? 0 : 1)"; then
            npm test -- --coverage --watchAll=false
          else
            echo "No frontend test script configured; skipping unit tests."
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: hashFiles('neufin-web/coverage/**') != ''
        with:
          flags: frontend

  # ── Build Check ───────────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    needs: lint
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL || 'https://api.example.com' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.POSTHOG_KEY || '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: neufin-web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix neufin-web

      - name: Validate required public env
        run: |
          test -n "$NEXT_PUBLIC_SUPABASE_URL" || (echo "NEXT_PUBLIC_SUPABASE_URL is empty" && exit 1)
          test -n "$NEXT_PUBLIC_SUPABASE_ANON_KEY" || (echo "NEXT_PUBLIC_SUPABASE_ANON_KEY is empty" && exit 1)

      - name: Next.js build
        run: npm run build --prefix neufin-web

      - name: Check bundle size
        if: github.event_name == 'pull_request'
        uses: preactjs/compressed-size-action@v2
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          install-script: npm ci --prefix neufin-web
          build-script: npm run build --prefix neufin-web
          pattern: "{neufin-web/.next/static/**/*.{js,css},neufin-web/dist/**/*.{js,css,html}}"
          exclude: "{**/*.map,**/node_modules/**}"
          strip-hash: "\\.[0-9a-f]{6,}\\."
          minimum-change-threshold: 100
          comment-key: web-next-static

  # ── E2E Tests (Playwright) ─────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    env:
      NEXT_PUBLIC_API_URL: ${{ secrets.STAGING_API_URL || 'https://api.example.com' }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL || 'https://example.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY || 'ci-placeholder-anon-key' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: neufin-web/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix neufin-web

      - name: Install Playwright browsers
        working-directory: neufin-web
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.devDependencies?.['@playwright/test'] || pkg.dependencies?.['@playwright/test'] ? 0 : 1)"; then
            npx playwright install --with-deps chromium
          else
            echo "Playwright not configured; skipping browser install."
          fi

      - name: Run E2E tests
        working-directory: neufin-web
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.devDependencies?.['@playwright/test'] || pkg.dependencies?.['@playwright/test'] ? 0 : 1)"; then
            npx playwright test
          else
            echo "Playwright not configured; skipping E2E tests."
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always() && hashFiles('neufin-web/playwright-report/**') != ''
        with:
          name: playwright-report
          path: neufin-web/playwright-report/
          retention-days: 7

  # ── Deploy Preview (Vercel via git push) ──────────────────────────────────
  # Vercel auto-deploys on PR — no workflow step needed.
  # Production deploys automatically on merge to main via Vercel integration.
