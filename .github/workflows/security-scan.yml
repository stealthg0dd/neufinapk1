name: Security Scan

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  push:
    branches: [main]

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # needed to create GitHub Issues
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── pip-audit (Python dependencies) ───────────────────────────────────
      - name: Install pip-audit
        run: pip install pip-audit

      - name: pip-audit — neufin-backend
        id: pip-audit
        run: |
          pip-audit \
            -r neufin-backend/requirements.txt \
            --format json \
            -o /tmp/pip-audit.json \
            --progress-spinner off || true
          # Surface HIGH/CRITICAL (pip-audit uses CVSS severity labels)
          VULNS=$(python3 -c "
          import json, sys
          data = json.load(open('/tmp/pip-audit.json'))
          findings = []
          for dep in data.get('dependencies', []):
              for v in dep.get('vulns', []):
                  sev = v.get('fix_versions', [])
                  findings.append(f\"- {dep['name']}@{dep['version']}: {v['id']} — {v.get('description','')[:120]}\")
          print('\n'.join(findings) if findings else 'none')
          " 2>/dev/null || echo "parse-error")
          echo "findings<<EOF" >> $GITHUB_OUTPUT
          echo "$VULNS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "pip_audit_raw<<EOF" >> $GITHUB_OUTPUT
          cat /tmp/pip-audit.json >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── npm audit (Web) ────────────────────────────────────────────────────
      - name: npm audit — neufin-web
        id: npm-audit-web
        working-directory: neufin-web
        run: |
          npm ci --quiet
          # audit exits non-zero on findings; capture but don't fail the step
          npm audit --audit-level=high --json > /tmp/npm-audit-web.json 2>&1 || true
          HIGH_CRIT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/npm-audit-web.json'))
              vulns = data.get('vulnerabilities', {})
              findings = [f\"- {k}: {v.get('severity','?')} — {v.get('via',[{}])[0] if isinstance(v.get('via',[{}])[0], str) else v.get('via',[{}])[0].get('title','?') if v.get('via') else '?'}\"
                          for k, v in vulns.items() if v.get('severity') in ('high','critical')]
              print('\n'.join(findings) if findings else 'none')
          except Exception as e:
              print('parse-error: ' + str(e))
          " 2>/dev/null || echo "parse-error")
          echo "findings<<EOF" >> $GITHUB_OUTPUT
          echo "$HIGH_CRIT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── npm audit (Mobile) ────────────────────────────────────────────────
      - name: npm audit — neufin-mobile
        id: npm-audit-mobile
        working-directory: neufin-mobile
        run: |
          npm ci --quiet
          npm audit --audit-level=high --json > /tmp/npm-audit-mobile.json 2>&1 || true
          HIGH_CRIT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/npm-audit-mobile.json'))
              vulns = data.get('vulnerabilities', {})
              findings = [f\"- {k}: {v.get('severity','?')} — {v.get('via',[{}])[0] if isinstance(v.get('via',[{}])[0], str) else v.get('via',[{}])[0].get('title','?') if v.get('via') else '?'}\"
                          for k, v in vulns.items() if v.get('severity') in ('high','critical')]
              print('\n'.join(findings) if findings else 'none')
          except Exception as e:
              print('parse-error: ' + str(e))
          " 2>/dev/null || echo "parse-error")
          echo "findings<<EOF" >> $GITHUB_OUTPUT
          echo "$HIGH_CRIT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Trivy — full repo scan ─────────────────────────────────────────────
      - name: Trivy scan
        id: trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: '/tmp/trivy.json'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'        # don't fail the step; we handle it below
          ignore-unfixed: true

      - name: Parse Trivy results
        id: trivy-parse
        run: |
          HIGH_CRIT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/trivy.json'))
              findings = []
              for result in data.get('Results', []):
                  for v in result.get('Vulnerabilities', []):
                      sev = v.get('Severity', '')
                      if sev in ('HIGH', 'CRITICAL'):
                          findings.append(f\"- [{sev}] {result.get('Target','?')}: {v.get('VulnerabilityID','?')} in {v.get('PkgName','?')}@{v.get('InstalledVersion','?')} — {v.get('Title','?')[:100]}\")
              print('\n'.join(findings[:50]) if findings else 'none')
          except Exception as e:
              print('parse-error: ' + str(e))
          ")
          echo "findings<<EOF" >> $GITHUB_OUTPUT
          echo "$HIGH_CRIT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ── Determine if issues were found ────────────────────────────────────
      - name: Check for HIGH/CRITICAL findings
        id: check
        # Pass findings via env vars — safe for any special chars (backticks, quotes, etc.)
        env:
          PIP_FINDINGS: ${{ steps.pip-audit.outputs.findings }}
          WEB_FINDINGS: ${{ steps.npm-audit-web.outputs.findings }}
          MOB_FINDINGS: ${{ steps.npm-audit-mobile.outputs.findings }}
          TRIVY_FINDINGS: ${{ steps.trivy-parse.outputs.findings }}
        run: |
          PIP="${PIP_FINDINGS:-none}"
          WEB="${WEB_FINDINGS:-none}"
          MOB="${MOB_FINDINGS:-none}"
          TRIVY="${TRIVY_FINDINGS:-none}"

          HAS_FINDINGS="false"
          [[ "$PIP"   != "none" && -n "$PIP"   ]] && HAS_FINDINGS="true"
          [[ "$WEB"   != "none" && -n "$WEB"   ]] && HAS_FINDINGS="true"
          [[ "$MOB"   != "none" && -n "$MOB"   ]] && HAS_FINDINGS="true"
          [[ "$TRIVY" != "none" && -n "$TRIVY" ]] && HAS_FINDINGS="true"

          echo "has_findings=$HAS_FINDINGS" >> $GITHUB_OUTPUT

          # Write report to a temp file; use printf/echo to stay YAML-indentation safe
          {
            echo "## Security Scan Report"
            echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')"
            echo "**Commit:** ${GITHUB_SHA}"
            echo "**Triggered by:** ${GITHUB_EVENT_NAME}"
            echo ""
            echo "### pip-audit (neufin-backend)"
            printf '```\n'
            echo "${PIP}"
            printf '```\n'
            echo ""
            echo "### npm audit (neufin-web)"
            printf '```\n'
            echo "${WEB}"
            printf '```\n'
            echo ""
            echo "### npm audit (neufin-mobile)"
            printf '```\n'
            echo "${MOB}"
            printf '```\n'
            echo ""
            echo "### Trivy (full repo, HIGH/CRITICAL)"
            printf '```\n'
            echo "${TRIVY}"
            printf '```\n'
          } > /tmp/security-report.md

          echo "report<<EOREPORT" >> $GITHUB_OUTPUT
          cat /tmp/security-report.md >> $GITHUB_OUTPUT
          echo "EOREPORT" >> $GITHUB_OUTPUT

      # ── Create GitHub Issue ───────────────────────────────────────────────
      - name: Create GitHub Issue for HIGH/CRITICAL findings
        if: steps.check.outputs.has_findings == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure labels exist (idempotent — --force skips error if already present)
          gh label create "security"  --color "#e11d48" --description "Security vulnerability" --force || true
          gh label create "automated" --color "#6366f1" --description "Created by automation"  --force || true

          EXISTING=$(gh issue list \
            --label "security" \
            --state open \
            --json number,title \
            --jq '[.[] | select(.title | startswith("🔴 Security Scan"))] | length')

          if [ "$EXISTING" -gt "0" ]; then
            echo "Open security issue already exists; skipping creation to avoid duplicates."
          else
            gh issue create \
              --title "🔴 Security Scan — HIGH/CRITICAL findings $(date -u '+%Y-%m-%d')" \
              --label "security,automated" \
              --body-file /tmp/security-report.md
          fi

      # ── Slack notification ─────────────────────────────────────────────────
      - name: Notify Slack — findings found
        if: steps.check.outputs.has_findings == 'true'
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_NEUFIN_DEV }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          [ -z "$SLACK_WEBHOOK" ] && exit 0
          curl -s -X POST "$SLACK_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🔴 *Security Scan — HIGH/CRITICAL vulnerabilities found*\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Details\", \"value\": \"<${REPO_URL}/issues|View GitHub Issues>\", \"short\": false}
                ]
              }]
            }" || true

      - name: Notify Slack — scan clean
        if: steps.check.outputs.has_findings == 'false'
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_NEUFIN_DEV }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"✅ *Security Scan — No HIGH/CRITICAL findings* ($(date -u '+%Y-%m-%d'))\"
            }"
