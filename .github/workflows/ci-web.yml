name: CI Web

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'neufin-web/**'
      - '.github/workflows/ci-web.yml'
  push:
    branches: [develop, main]
    paths:
      - 'neufin-web/**'
      - '.github/workflows/ci-web.yml'

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    name: Web CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neufin-web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: neufin-web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true  # non-blocking until ESLint is fixed

      - name: Build
        env:
          # Use placeholder values — build must pass without real keys
          NEXT_PUBLIC_API_URL: https://placeholder.invalid
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          # Skip Sentry in CI
          SENTRY_DSN: ""
        run: npm run build
