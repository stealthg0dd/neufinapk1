name: CI Mobile

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches: [develop, main]
    paths:
      - 'neufin-mobile/**'
      - '.github/workflows/ci-mobile.yml'
  push:
    branches: [develop, main]
    paths:
      - 'neufin-mobile/**'
      - '.github/workflows/ci-mobile.yml'

concurrency:
  group: ci-mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mobile-checks:
    name: Mobile CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: neufin-mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: neufin-mobile/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true
