# Vercel deploys natively from branch — this workflow
# only validates post-deploy readiness and marks Sentry releases.

name: Post-Deploy Web

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'neufin-web/**'

jobs:
  validate-deploy:
    name: Post-deploy web validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set target URL
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "url=https://www.neufin.ai" >> $GITHUB_OUTPUT
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "url=https://staging.neufin.ai" >> $GITHUB_OUTPUT
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Wait for Vercel deploy
        run: sleep 45

      - name: Readiness check
        env:
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS_SECRET }}
        run: |
          # Public JSON route (middleware skips /api in matcher). Never use curl -f inside
          # $(...) with `|| echo 000` — curl -f can print the HTTP code then fail, and the
          # shell concatenates stdout with `000` → bogus codes like `401000`.
          BASE="${{ steps.env.outputs.url }}"
          URL="${BASE%/}/api/market/ticker"
          CURL=(curl -sS -L -o /dev/null -w "%{http_code}")
          if [ -n "$VERCEL_PROTECTION_BYPASS" ]; then
            CURL+=(-H "x-vercel-protection-bypass: $VERCEL_PROTECTION_BYPASS")
          fi
          STATUS=$("${CURL[@]}" "$URL") || STATUS="000"
          echo "Status: $STATUS (GET $URL)"
          REF="${{ github.ref_name }}"
          if [ "$STATUS" = "200" ]; then
            echo "Web deploy confirmed at $BASE"
            exit 0
          fi
          if [ "$REF" != "main" ] && { [ "$STATUS" = "401" ] || [ "$STATUS" = "403" ]; }; then
            echo "Non-production URL returned $STATUS (likely Vercel deployment protection). Treating as OK."
            echo "Optional: add repo secret VERCEL_PROTECTION_BYPASS_SECRET for a real 200 check on staging."
            exit 0
          fi
          echo "Web readiness check failed"
          exit 1

      - name: Create Sentry release
        if: github.ref_name == 'main'
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: neufin-web
        with:
          environment: ${{ steps.env.outputs.name }}
          version: ${{ github.sha }}
        continue-on-error: true
