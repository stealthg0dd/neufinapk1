# Vercel deploys natively from branch — this workflow
# only validates post-deploy readiness and marks Sentry releases.

name: Post-Deploy Web

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'neufin-web/**'

jobs:
  validate-deploy:
    name: Post-deploy web validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set target URL
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "url=https://www.neufin.ai" >> $GITHUB_OUTPUT
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "url=https://staging.neufin.ai" >> $GITHUB_OUTPUT
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Wait for Vercel deploy
        run: sleep 45

      - name: Readiness check
        run: |
          # Use a public JSON route (middleware does not gate /api/*). Do not use curl -f
          # inside $(...) with `|| echo 000` — on HTTP errors curl -f still prints the code to
          # stdout then fails, and the shell concatenates `401` + `000` → `401000`.
          BASE="${{ steps.env.outputs.url }}"
          URL="${BASE%/}/api/market/ticker"
          STATUS=$(curl -sS -L -o /dev/null -w "%{http_code}" "$URL") || STATUS="000"
          echo "Status: $STATUS (GET $URL)"
          if [ "$STATUS" != "200" ]; then
            echo "Web readiness check failed"
            exit 1
          fi
          echo "Web deploy confirmed at $BASE"

      - name: Create Sentry release
        if: github.ref_name == 'main'
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: neufin-web
        with:
          environment: ${{ steps.env.outputs.name }}
          version: ${{ github.sha }}
        continue-on-error: true
