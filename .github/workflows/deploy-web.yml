name: Deploy Web — Staging

on:
  # Runs after Web CI completes successfully on develop
  workflow_run:
    workflows: ["Web CI"]
    types: [completed]
    branches: [develop]

jobs:
  deploy:
    name: Deploy to Vercel (Staging)
    runs-on: ubuntu-latest
    # Only deploy when CI passed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel

      # ── Deploy preview (staging) ──────────────────────────────────────────
      # Deploy from repo root — Vercel project has rootDirectory="neufin-web"
      # set in its settings, so running from root avoids the neufin-web/neufin-web
      # path doubling that occurs when working-directory: neufin-web is used.
      - name: Deploy to Vercel (staging preview)
        id: vercel-deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_NEUFIN_WEB }}
        run: |
          RAW=$(vercel deploy --yes --token "$VERCEL_TOKEN" 2>&1 | tee /tmp/vercel-output.txt)
          DEPLOYMENT_URL=$(echo "$RAW" | grep -oE 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)
          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Could not extract deployment URL from output:"
            cat /tmp/vercel-output.txt
            exit 1
          fi
          echo "deployment_url=$DEPLOYMENT_URL" >> $GITHUB_OUTPUT
          echo "Staging deployed to: $DEPLOYMENT_URL"

      # ── Slack Success ─────────────────────────────────────────────────────
      - name: Notify Slack — staging deploy success
        if: success()
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK_NEUFIN_DEV }}"
          [ -z "$WEBHOOK" ] && exit 0
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🚀 *neufin-web deployed to staging*\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"URL\", \"value\": \"${{ steps.vercel-deploy.outputs.deployment_url }}\", \"short\": false},
                  {\"title\": \"Branch\", \"value\": \"develop\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}|${{ github.event.workflow_run.head_sha }}>\", \"short\": true}
                ]
              }]
            }" || true

      # ── Slack Failure ─────────────────────────────────────────────────────
      - name: Notify Slack — staging deploy failure
        if: failure()
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK_NEUFIN_DEV }}"
          [ -z "$WEBHOOK" ] && exit 0
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *neufin-web staging deploy FAILED*\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}|${{ github.event.workflow_run.head_sha }}>\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\", \"short\": false}
                ]
              }]
            }" || true
