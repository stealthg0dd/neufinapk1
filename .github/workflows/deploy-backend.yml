# Railway deploys natively from branch — this workflow
# only validates post-deploy health and marks Sentry releases.

name: Post-Deploy Backend

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main, develop]
    paths:
      - 'neufin-backend/**'

jobs:
  validate-deploy:
    name: Post-deploy validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "url=https://neufin101-production.up.railway.app" >> $GITHUB_OUTPUT
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "url=https://neufin101-staging.up.railway.app" >> $GITHUB_OUTPUT
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Wait for Railway deploy
        run: sleep 60

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
              ${{ steps.env.outputs.url }}/health || echo "000")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 20
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Create Sentry release
        if: github.ref_name == 'main'
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: neufin-backend
        with:
          environment: ${{ steps.env.outputs.name }}
          version: ${{ github.sha }}
        continue-on-error: true
