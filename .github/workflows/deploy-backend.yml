name: Deploy Backend — Staging

on:
  # Runs after Backend CI completes successfully on develop
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches: [develop]

jobs:
  deploy:
    name: Deploy to Railway (Staging)
    runs-on: ubuntu-latest
    # Only deploy when CI passed (not on failure or cancellation)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # ── Deploy ────────────────────────────────────────────────────────────
      - name: Deploy neufin-backend to Railway (staging)
        working-directory: neufin-backend
        run: railway up --service Neufin101 --environment staging --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Railway propagates in ~30s; wait before health-checking
      - name: Wait for Railway deployment to propagate
        run: sleep 45

      # ── Health Check ──────────────────────────────────────────────────────
      - name: Health check /health
        run: |
          HEALTH_URL="${{ secrets.RAILWAY_STAGING_BACKEND_URL }}/health"
          echo "Checking $HEALTH_URL"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "$HEALTH_URL" \
              -H "Accept: application/json" \
              --max-time 15 \
              -o /tmp/health.json -w "%{http_code}" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              BODY_STATUS=$(python3 -c "import json; d=json.load(open('/tmp/health.json')); print(d.get('status',''))" 2>/dev/null || echo "")
              if [ "$BODY_STATUS" = "ok" ]; then
                echo "✅ Health check passed (status=ok)"
                exit 0
              fi
              echo "Attempt $i: HTTP 200 but status='$BODY_STATUS', retrying..."
            else
              echo "Attempt $i: HTTP $STATUS, retrying in 15s..."
            fi
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      # ── Slack Success ─────────────────────────────────────────────────────
      - name: Notify Slack — staging deploy success
        if: success()
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK_NEUFIN_DEV }}"
          [ -z "$WEBHOOK" ] && exit 0
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"🚀 *neufin-backend deployed to staging*\",
              \"attachments\": [{
                \"color\": \"good\",
                \"fields\": [
                  {\"title\": \"Branch\", \"value\": \"develop\", \"short\": true},
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}|${{ github.event.workflow_run.head_sha }}>\", \"short\": true},
                  {\"title\": \"Environment\", \"value\": \"staging\", \"short\": true}
                ]
              }]
            }" || true

      # ── Slack Failure ─────────────────────────────────────────────────────
      - name: Notify Slack — staging deploy failure
        if: failure()
        run: |
          WEBHOOK="${{ secrets.SLACK_WEBHOOK_NEUFIN_DEV }}"
          [ -z "$WEBHOOK" ] && exit 0
          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"text\": \"❌ *neufin-backend staging deploy FAILED*\",
              \"attachments\": [{
                \"color\": \"danger\",
                \"fields\": [
                  {\"title\": \"Commit\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}|${{ github.event.workflow_run.head_sha }}>\", \"short\": true},
                  {\"title\": \"Run\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>\", \"short\": false}
                ]
              }]
            }" || true
