[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand is intentionally omitted — the Dockerfile CMD runs gunicorn
# with ${GUNICORN_WORKERS:-4} workers and ${PORT} from Railway's env injection.
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[healthcheck]
path = "/health"
intervalSeconds = 60
timeoutSeconds = 100
