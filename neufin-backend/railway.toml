[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Use gunicorn+uvicorn workers — matches the working production config in railway.json
startCommand = "sh -c 'exec gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --workers 2 --bind 0.0.0.0:${PORT:-8000} --timeout 300 --keep-alive 5 --access-logfile - --error-logfile -'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ALWAYS"
