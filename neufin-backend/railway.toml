[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# uvicorn with 2 workers — lightweight and fast for Railway's single-instance plan.
# Timeout 300 s is preserved in railway.json startCommand for gunicorn fallback.
startCommand = "sh -c 'uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000} --workers 2'"
healthcheckPath = "/health"
restartPolicyType = "ALWAYS"
