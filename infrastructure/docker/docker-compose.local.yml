version: "3.9"

# Local development stack
# Usage: docker-compose -f infrastructure/docker/docker-compose.local.yml up

services:
  neufin-backend:
    build:
      context: ../../neufin-backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../neufin-backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - ../../neufin-backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
