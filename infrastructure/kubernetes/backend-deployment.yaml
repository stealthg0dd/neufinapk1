apiVersion: apps/v1
kind: Deployment
metadata:
  name: neufin-backend
  namespace: neufin
  labels:
    app: neufin-backend
    tier: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: neufin-backend
  template:
    metadata:
      labels:
        app: neufin-backend
    spec:
      containers:
        - name: neufin-backend
          image: ghcr.io/varunsrivastava/neufin-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: neufin-backend-secrets
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: neufin-backend-svc
  namespace: neufin
spec:
  selector:
    app: neufin-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: neufin-backend-ingress
  namespace: neufin
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.neufin.app
      secretName: neufin-backend-tls
  rules:
    - host: api.neufin.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: neufin-backend-svc
                port:
                  number: 80
